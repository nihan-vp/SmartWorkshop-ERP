<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wrenchGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Gear shape -->
  <g transform="translate(50,50)">
    <!-- Gear teeth (12 teeth) -->
    <g fill="url(#gearGrad)">
      <rect x="-6" y="-42" width="12" height="14" rx="2"/>
      <rect x="-6" y="-42" width="12" height="14" rx="2" transform="rotate(30)"/>
      <rect x="-6" y="-42" width="12" height="14" rx="2" transform="rotate(60)"/>
      <rect x="-6" y="-42" width="12" height="14" rx="2" transform="rotate(90)"/>
      <rect x="-6" y="-42" width="12" height="14" rx="2" transform="rotate(120)"/>
      <rect x="-6" y="-42" width="12" height="14" rx="2" transform="rotate(150)"/>
      <rect x="-6" y="-42" width="12" height="14" rx="2" transform="rotate(180)"/>
      <rect x="-6" y="-42" width="12" height="14" rx="2" transform="rotate(210)"/>
      <rect x="-6" y="-42" width="12" height="14" rx="2" transform="rotate(240)"/>
      <rect x="-6" y="-42" width="12" height="14" rx="2" transform="rotate(270)"/>
      <rect x="-6" y="-42" width="12" height="14" rx="2" transform="rotate(300)"/>
      <rect x="-6" y="-42" width="12" height="14" rx="2" transform="rotate(330)"/>
    </g>
    <!-- Gear body ring -->
    <circle cx="0" cy="0" r="34" fill="url(#gearGrad)"/>
    <!-- Gear inner hole -->
    <circle cx="0" cy="0" r="14" fill="white"/>
  </g>

  <!-- Wrench handle + jaw (horizontal) -->
  <!-- Handle bar -->
  <rect x="22" y="45" width="56" height="10" rx="5" fill="url(#wrenchGrad)"/>
  <!-- Open jaw (C-shape on right) -->
  <path d="M72 40 Q88 40 88 50 Q88 60 72 60 L72 55 Q82 55 82 50 Q82 45 72 45 Z" fill="url(#wrenchGrad)"/>
  <!-- Box/closed end on left -->
  <rect x="18" y="40" width="12" height="20" rx="4" fill="url(#wrenchGrad)"/>

  <!-- Green circuit dots (tech accent) -->
  <circle cx="68" cy="35" r="3" fill="#22c55e"/>
  <circle cx="76" cy="31" r="2" fill="#22c55e"/>
  <circle cx="72" cy="27" r="1.5" fill="#22c55e"/>
  <line x1="68" y1="35" x2="76" y2="31" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="76" y1="31" x2="72" y2="27" stroke="#22c55e" stroke-width="1.5"/>
</svg>
