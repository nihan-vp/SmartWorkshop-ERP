<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#blueGrad)" />
  
  <!-- Outer Gear/Cog Circle -->
  <g fill="#ffffff" opacity="0.9">
    <path d="M256,120 A136,136 0 1,0 392,256 A136,136 0 0,0 256,120 M256,160 A96,96 0 1,1 160,256 A96,96 0 0,1 256,160 Z" />
    <!-- Gear Teeth -->
    <rect x="236" y="80" width="40" height="50" rx="10" transform="rotate(0 256 256)" />
    <rect x="236" y="80" width="40" height="50" rx="10" transform="rotate(45 256 256)" />
    <rect x="236" y="80" width="40" height="50" rx="10" transform="rotate(90 256 256)" />
    <rect x="236" y="80" width="40" height="50" rx="10" transform="rotate(135 256 256)" />
    <rect x="236" y="80" width="40" height="50" rx="10" transform="rotate(180 256 256)" />
    <rect x="236" y="80" width="40" height="50" rx="10" transform="rotate(225 256 256)" />
    <rect x="236" y="80" width="40" height="50" rx="10" transform="rotate(270 256 256)" />
    <rect x="236" y="80" width="40" height="50" rx="10" transform="rotate(315 256 256)" />
  </g>

  <!-- Wrench and Screwdriver Cross inside -->
  <path d="M220,200 L292,272 M292,200 L220,272" stroke="#ffffff" stroke-width="24" stroke-linecap="round" opacity="0.8" />
  
  <!-- Stylized letter 'S' in the center -->
  <text x="256" y="296" font-family="'Inter', sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle">S</text>
</svg>
