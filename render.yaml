services:
  - type: web
    name: suhaimsoft-laravel
    runtime: php
    plan: free
    buildCommand: "composer install --no-dev --optimize-autoloader"
    preDeployCommand: "php artisan migrate --force"
    envVars:
      - key: DOCUMENT_ROOT
        value: public
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: suhaimsoft-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: suhaimsoft-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: suhaimsoft-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: suhaimsoft-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: suhaimsoft-db
          property: password

databases:
  - name: suhaimsoft-db
    databaseName: suhaimsoft
    user: suhaimsoft_user
    plan: free
